name: Build Cassandra Ref

# On-demand build of a single arbitrary Apache Cassandra git ref.
#
# Produces TWO artifacts from one build:
#   1. A GHCR Docker image that is a drop-in for the Docker Official `cassandra`
#      image (same docker-entrypoint.sh contract, CASSANDRA_* env vars, ports,
#      and /var/lib/cassandra volume) — see .github/cassandra-image/.
#   2. A binary tarball attached to a per-build GitHub release, consumable by the
#      lab install path (cassandra_versions.yaml + install_cassandra.sh).
#
# Three sequential jobs make "build fails -> nothing published" structural:
#   resolve -> build -> publish (publish needs both).
#
# `latest` is reserved for the main CLI image (see .github/CLAUDE.md) and is
# NEVER produced here.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Cassandra git ref to build (branch, tag, or commit SHA)'
        required: true
        type: string
      repo:
        description: 'Source repo (owner/name), for forks'
        required: false
        type: string
        default: 'apache/cassandra'
      jdk:
        description: 'Override the build JDK (e.g. 11, 17, 21). Blank = auto-map from version.'
        required: false
        type: string
        default: ''
      base_image:
        description: 'Override the runtime JRE base image the container is built FROM. Blank = auto-map.'
        required: false
        type: string
        default: ''

  # Reusable engine: build-cassandra-set.yml calls this once per matrix version so
  # every version gets the SAME correct per-version JDK/base-image and BOTH artifacts
  # (GHCR image + per-sha tarball release). The caller collects the tarball via the
  # `artifact_name` output / uploaded workflow artifact and the `tarball_name` +
  # `release_tag` outputs below.
  workflow_call:
    inputs:
      ref:
        description: 'Cassandra git ref to build (branch, tag, or commit SHA)'
        required: true
        type: string
      repo:
        description: 'Source repo (owner/name), for forks'
        required: false
        type: string
        default: 'apache/cassandra'
      jdk:
        description: 'Override the build JDK (e.g. 11, 17, 21). Blank = auto-map from version.'
        required: false
        type: string
        default: ''
      base_image:
        description: 'Override the runtime JRE base image the container is built FROM. Blank = auto-map.'
        required: false
        type: string
        default: ''
      stable_version:
        description: >-
          Optional stable version label (e.g. 5.0-HEAD, 6.0, trunk). When set, the
          uploaded tarball artifact is named `cassandra-tarball-<stable_version>` so a
          matrix caller can collect and rename each build deterministically. Blank =
          artifact name falls back to the sanitized ref tag.
        required: false
        type: string
        default: ''
    outputs:
      version:
        description: 'Cassandra base.version read from build.xml.'
        value: ${{ jobs.resolve.outputs.version }}
      short_sha:
        description: 'Short commit SHA the ref resolved to.'
        value: ${{ jobs.resolve.outputs.short_sha }}
      tarball_name:
        description: 'Filename of the built binary tarball (apache-cassandra-<version>-<sha>-bin.tar.gz).'
        value: ${{ jobs.resolve.outputs.tarball_name }}
      release_tag:
        description: 'Per-build GitHub release tag the tarball is attached to.'
        value: ${{ jobs.resolve.outputs.release_tag }}
      artifact_name:
        description: 'Name of the uploaded workflow artifact containing the tarball.'
        value: ${{ jobs.resolve.outputs.artifact_name }}
      image:
        description: 'Immutable GHCR image reference (repo:sha-<short_sha>).'
        value: ${{ jobs.resolve.outputs.image_repo }}:${{ jobs.resolve.outputs.sha_tag }}

jobs:
  resolve:
    name: Resolve ref and compute outputs
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
      short_sha: ${{ steps.resolve.outputs.short_sha }}
      version: ${{ steps.meta.outputs.version }}
      build_jdk: ${{ steps.meta.outputs.build_jdk }}
      ant_flags: ${{ steps.meta.outputs.ant_flags }}
      base_image: ${{ steps.meta.outputs.base_image }}
      image_repo: ${{ steps.meta.outputs.image_repo }}
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
      ref_tag: ${{ steps.meta.outputs.ref_tag }}
      tarball_name: ${{ steps.meta.outputs.tarball_name }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      # Deterministic name for the uploaded tarball artifact. When a caller passes a
      # stable_version (the matrix set workflow does), the name encodes it so the
      # aggregation job can pair each build to its stable filename; otherwise it falls
      # back to the sanitized ref tag, keeping the name unique across matrix calls.
      artifact_name: ${{ inputs.stable_version != '' && format('cassandra-tarball-{0}', inputs.stable_version) || format('cassandra-tarball-{0}', steps.meta.outputs.ref_tag) }}
    steps:
      - name: Check out this repo's image-assembly logic
        uses: actions/checkout@v7
        with:
          path: edl
          sparse-checkout: .github/cassandra-image
          fetch-depth: 1

      - name: Resolve ref to an immutable SHA
        id: resolve
        env:
          SOURCE_REPO: ${{ inputs.repo }}
          SOURCE_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail
          # Delegate to the unit-tested resolve_ref (git ls-remote / raw-SHA
          # fallback / fail-fast naming the bad ref). See resolve-ref.test.sh.
          # shellcheck source=.github/cassandra-image/resolve-ref.sh
          source edl/.github/cassandra-image/resolve-ref.sh
          resolve_ref >> "$GITHUB_OUTPUT"

      - name: Check out resolved SHA to read build.xml
        uses: actions/checkout@v7
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ steps.resolve.outputs.sha }}
          fetch-depth: 1
          path: cassandra-src

      - name: Compute version, JDK, ant flags, base image, and tags
        id: meta
        env:
          SOURCE_REF: ${{ inputs.ref }}
          SHORT_SHA: ${{ steps.resolve.outputs.short_sha }}
          JDK_OVERRIDE: ${{ inputs.jdk }}
          BASE_IMAGE_OVERRIDE: ${{ inputs.base_image }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail

          # Version from build.xml base.version.
          version="$(grep -oP 'property name="base.version" value="\K[^"]+' \
            cassandra-src/build.xml || echo unknown)"
          if [[ "$version" == "unknown" ]]; then
            echo "::error::could not read base.version from build.xml"
            exit 1
          fi
          export VERSION="$version"
          echo "Cassandra base.version = ${version}"

          # Delegate the pure version->plan mapping to the unit-tested script so
          # the JDK/ant-flags/base-image/tag logic stays in one place (see
          # resolve-build-plan.test.sh).
          # shellcheck source=.github/cassandra-image/resolve-build-plan.sh
          source edl/.github/cassandra-image/resolve-build-plan.sh
          plan="$(compute_build_plan)"
          echo "$plan" >> "$GITHUB_OUTPUT"

          echo "Resolved build plan:"
          # shellcheck disable=SC2001  # per-line prefix; parameter expansion can't do this
          echo "$plan" | sed 's/^/  /'

  build:
    name: Build Cassandra artifacts
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - name: Check out resolved SHA
        uses: actions/checkout@v7
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ needs.resolve.outputs.sha }}
          fetch-depth: 1

      - name: Set up build JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ needs.resolve.outputs.build_jdk }}

      - name: Build artifacts with ant
        env:
          # Version-specific ant flags from the resolve job. For 4.0/4.1 this is
          # -Duse.jdk11=true, which those branches require to compile under the
          # auto-mapped JDK 11 (they default to JDK 8). Empty for 5.0+/trunk.
          ANT_FLAGS: ${{ needs.resolve.outputs.ant_flags }}
        run: |
          set -euo pipefail
          # Runner-native build (not .build/docker/, which is absent on 4.0/4.1).
          ant realclean
          # ANT_FLAGS must word-split into separate ant args (and expand to
          # nothing when empty), so it is intentionally unquoted — same pattern
          # as packer/cassandra/install/install_cassandra.sh.
          # shellcheck disable=SC2086
          ant artifacts -Dno-checkstyle=true -Dant.gen-doc.skip=true $ANT_FLAGS

      - name: Locate and rename tarball
        id: artifact
        env:
          TARBALL_NAME: ${{ needs.resolve.outputs.tarball_name }}
        run: |
          set -euo pipefail
          src="$(find build -name 'apache-cassandra-*-bin.tar.gz' -type f | head -n1)"
          if [[ -z "$src" ]]; then
            echo "::error::no binary tarball found under build/"
            exit 1
          fi
          cp "$src" "$TARBALL_NAME"
          if [[ ! -s "$TARBALL_NAME" ]]; then
            echo "::error::renamed tarball ${TARBALL_NAME} is missing or empty"
            exit 1
          fi
          echo "Built $(du -h "$TARBALL_NAME" | cut -f1) tarball: ${TARBALL_NAME}"

      - name: Upload tarball for publish job
        uses: actions/upload-artifact@v7
        with:
          name: ${{ needs.resolve.outputs.artifact_name }}
          path: ${{ needs.resolve.outputs.tarball_name }}
          retention-days: 7
          if-no-files-found: error

  publish:
    name: Publish image and tarball
    needs: [resolve, build]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
    steps:
      - name: Check out image-assembly files
        uses: actions/checkout@v7

      - name: Download built tarball
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.resolve.outputs.artifact_name }}
          path: .github/cassandra-image

      # Build the image LOCALLY (load into the daemon, do NOT push). The smoke
      # test below runs against this local image so that a broken image never
      # reaches GHCR or a release — publishing only happens after it passes.
      - name: Build image locally
        env:
          IMAGE_REPO: ${{ needs.resolve.outputs.image_repo }}
          SHA_TAG: ${{ needs.resolve.outputs.sha_tag }}
          REF_TAG: ${{ needs.resolve.outputs.ref_tag }}
          # Stable version label (e.g. 5.0-HEAD, 6.0-HEAD, trunk) from a matrix
          # caller. Blank for direct/fork callers that don't pass stable_version.
          STABLE_VERSION: ${{ inputs.stable_version }}
          BASE_IMAGE: ${{ needs.resolve.outputs.base_image }}
          TARBALL_NAME: ${{ needs.resolve.outputs.tarball_name }}
          # OCI provenance inputs (issue #767) — stamp the image so `docker
          # inspect` traces it back to the exact Cassandra source commit.
          OCI_REVISION: ${{ needs.resolve.outputs.sha }}
          OCI_SOURCE: https://github.com/${{ inputs.repo }}
          OCI_VERSION: ${{ needs.resolve.outputs.version }}
          OCI_REF_NAME: ${{ inputs.ref }}
        run: |
          set -euo pipefail
          # RFC-3339 UTC build timestamp for org.opencontainers.image.created.
          created="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          # Always tag the immutable :sha-<short> and moving :<ref> tags. When a
          # matrix caller supplies a stable_version, ADD a third stable tag
          # (:5.0-HEAD / :6.0-HEAD / :trunk) so there is a stable pull URL that
          # matches the tarball naming. Sanitize it with the SAME transform as
          # ref_tag (tag-invalid chars -> '-', cap 128) for defensiveness; the
          # 5.0-HEAD/6.0-HEAD/trunk values pass through unchanged. Guarded on
          # non-empty so direct/fork callers are completely unaffected.
          tag_args=(--tag "${IMAGE_REPO}:${SHA_TAG}" --tag "${IMAGE_REPO}:${REF_TAG}")
          if [[ -n "$STABLE_VERSION" ]]; then
            version_tag="$(echo "$STABLE_VERSION" | sed 's/[^a-zA-Z0-9._-]/-/g' | cut -c1-128)"
            tag_args+=(--tag "${IMAGE_REPO}:${version_tag}")
          fi
          docker build \
            --build-arg BASE_IMAGE="$BASE_IMAGE" \
            --build-arg TARBALL="$TARBALL_NAME" \
            --build-arg OCI_REVISION="$OCI_REVISION" \
            --build-arg OCI_SOURCE="$OCI_SOURCE" \
            --build-arg OCI_VERSION="$OCI_VERSION" \
            --build-arg OCI_CREATED="$created" \
            --build-arg OCI_REF_NAME="$OCI_REF_NAME" \
            "${tag_args[@]}" \
            .github/cassandra-image

      # Gate the publish on a real smoke test against the locally-built image.
      # This must run BEFORE the GHCR push and the release so a broken cqlsh
      # (issue #764) or a server that never comes up prevents publishing.
      - name: Smoke test — image serves CQL
        env:
          IMAGE_REPO: ${{ needs.resolve.outputs.image_repo }}
          SHA_TAG: ${{ needs.resolve.outputs.sha_tag }}
        run: |
          set -euo pipefail
          image="${IMAGE_REPO}:${SHA_TAG}"

          # Pin Cassandra to a deterministic IP on a user-defined docker network
          # and dial cqlsh at that same IP. The vendored docker-entrypoint.sh
          # binds listen_address/broadcast_rpc_address to the container's own IP
          # (never loopback), and nodetool statusbinary reports readiness against
          # that interface — so cqlsh must connect to that IP, not 127.0.0.1
          # (issue #768). Never bind to 0.0.0.0; pin to the node's real IP.
          net="cass-smoke-$$"
          cass_ip="172.28.0.10"
          docker network create --subnet 172.28.0.0/16 "$net"
          cid="$(docker run -d --network "$net" --ip "$cass_ip" \
                  -e CASSANDRA_LISTEN_ADDRESS="$cass_ip" \
                  -e CASSANDRA_RPC_ADDRESS="$cass_ip" \
                  -e CASSANDRA_BROADCAST_RPC_ADDRESS="$cass_ip" \
                  "$image")"
          trap 'docker rm -f "$cid" >/dev/null 2>&1 || true; docker network rm "$net" >/dev/null 2>&1 || true' EXIT

          echo "Waiting for the native transport to report running (bounded timeout)..."
          ready=
          for _ in $(seq 1 60); do
            status="$(docker exec "$cid" nodetool statusbinary 2>/dev/null || true)"
            if [[ "$status" == *running* ]]; then
              ready=1
              break
            fi
            sleep 5
          done

          if [[ -z "$ready" ]]; then
            echo "::error::native transport did not report 'running' within the timeout"
            docker logs "$cid" || true
            exit 1
          fi
          echo "nodetool statusbinary: running"

          # Bounded poll of the REAL CQL endpoint. statusbinary can report
          # "running" before the native-transport socket actually accepts, so
          # this is a stronger readiness gate on the exact thing we test — not a
          # weakening. The job still FAILS if the endpoint never accepts within
          # the bound (no `|| true` around the overall outcome). Dial the pinned
          # container IP (not loopback) — see #768 above.
          echo "Polling the CQL endpoint (bounded)..."
          cql_ok=
          for _ in $(seq 1 24); do          # ~2 min: 24 * 5s
            if docker exec "$cid" cqlsh "$cass_ip" 9042 \
                 -e 'SELECT release_version FROM system.local;' >/tmp/cql.out 2>/tmp/cql.err; then
              cql_ok=1
              break
            fi
            sleep 5
          done

          if [ -n "$cql_ok" ]; then
            echo "CQL query succeeded:"
            cat /tmp/cql.out
          else
            # On exhaustion, dump full diagnostics to distinguish a readiness
            # race from a bind that never applied, THEN fail. The final visible
            # cqlsh attempt keeps --debug and shows its stderr (no 2>/dev/null),
            # preserving the #766 hardening.
            echo "::error::CQL endpoint never accepted within the bounded retry"
            echo "===== last cqlsh stderr (with --debug) ====="
            docker exec "$cid" cqlsh --debug "$cass_ip" 9042 -e 'SELECT release_version FROM system.local;' || true
            echo "===== docker logs ====="
            docker logs "$cid" || true
            echo "===== effective bind config ====="
            # find the effective cassandra.yaml via the entrypoint's CASSANDRA_CONF
            conf="$(docker exec "$cid" bash -c 'echo "${CASSANDRA_CONF:-/etc/cassandra}"')"
            docker exec "$cid" bash -c "grep -E '^(rpc_address|listen_address|broadcast_address|broadcast_rpc_address|start_native_transport|native_transport_port):' \"$conf/cassandra.yaml\"" || true
            echo "===== listening sockets (what is bound to 9042) ====="
            docker exec "$cid" bash -c 'ss -tlnp 2>/dev/null || netstat -tlnp 2>/dev/null || true'
            exit 1
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Push only after the smoke test passed.
      - name: Push image
        env:
          IMAGE_REPO: ${{ needs.resolve.outputs.image_repo }}
          SHA_TAG: ${{ needs.resolve.outputs.sha_tag }}
          REF_TAG: ${{ needs.resolve.outputs.ref_tag }}
          STABLE_VERSION: ${{ inputs.stable_version }}
        run: |
          set -euo pipefail
          docker push "${IMAGE_REPO}:${SHA_TAG}"
          docker push "${IMAGE_REPO}:${REF_TAG}"
          # Also push the stable version tag when a matrix caller supplied one.
          # Same sanitization as the build step; guarded so direct/fork callers
          # (empty STABLE_VERSION) push only :sha and :ref.
          if [[ -n "$STABLE_VERSION" ]]; then
            version_tag="$(echo "$STABLE_VERSION" | sed 's/[^a-zA-Z0-9._-]/-/g' | cut -c1-128)"
            docker push "${IMAGE_REPO}:${version_tag}"
          fi

      # Create the release only after the smoke test passed and the image pushed.
      - name: Create per-build release with tarball
        id: release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.resolve.outputs.release_tag }}
          name: "Cassandra ${{ needs.resolve.outputs.version }} (${{ needs.resolve.outputs.short_sha }})"
          prerelease: true
          draft: false
          body: |
            On-demand Apache Cassandra build.

            - **Source repo**: `${{ inputs.repo }}`
            - **Ref**: `${{ inputs.ref }}`
            - **Commit**: `${{ needs.resolve.outputs.sha }}`
            - **Version**: `${{ needs.resolve.outputs.version }}`
            - **Build JDK**: `${{ needs.resolve.outputs.build_jdk }}`
            - **Image**: `${{ needs.resolve.outputs.image_repo }}:${{ needs.resolve.outputs.sha_tag }}`

            These are development builds and should not be used in production.
          files: .github/cassandra-image/${{ needs.resolve.outputs.tarball_name }}

      - name: Write run summary
        env:
          IMAGE_REPO: ${{ needs.resolve.outputs.image_repo }}
          SHA_TAG: ${{ needs.resolve.outputs.sha_tag }}
          REF_TAG: ${{ needs.resolve.outputs.ref_tag }}
          STABLE_VERSION: ${{ inputs.stable_version }}
          VERSION: ${{ needs.resolve.outputs.version }}
          SHA: ${{ needs.resolve.outputs.sha }}
          RELEASE_TAG: ${{ needs.resolve.outputs.release_tag }}
          TARBALL_NAME: ${{ needs.resolve.outputs.tarball_name }}
        run: |
          set -euo pipefail
          tarball_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${TARBALL_NAME}"
          {
            echo "## Cassandra ref build"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Version | \`${VERSION}\` |"
            echo "| Commit | \`${SHA}\` |"
            echo "| Image (immutable) | \`${IMAGE_REPO}:${SHA_TAG}\` |"
            echo "| Image (ref) | \`${IMAGE_REPO}:${REF_TAG}\` |"
            # Only present when a matrix caller supplied a stable_version.
            if [[ -n "$STABLE_VERSION" ]]; then
              version_tag="$(echo "$STABLE_VERSION" | sed 's/[^a-zA-Z0-9._-]/-/g' | cut -c1-128)"
              echo "| Image (version) | \`${IMAGE_REPO}:${version_tag}\` |"
            fi
            echo "| Tarball | ${tarball_url} |"
            echo ""
            echo "Pull: \`docker pull ${IMAGE_REPO}:${SHA_TAG}\`"
          } >> "$GITHUB_STEP_SUMMARY"
