services:
  redis:
    image: valkey/valkey:8-alpine
    container_name: easydblab-valkey
    command: ["valkey-server", "--port", "6399"]
    ports:
      - "6399:6399"
    healthcheck:
      test: ["CMD", "valkey-cli", "-p", "6399", "ping"]
      interval: 1s
      timeout: 3s
      retries: 30
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.118.0
    container_name: easydblab-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317"
      - "4318"
      - "55679"
