receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  # Jaeger Thrift Compact (UDP 6831) — receives traces from TiDB's built-in OpenTracing reporter.
  # TiDB v8.x has no native OTel support; it uses the OpenTracing/Jaeger protocol instead.
  # The OTel Collector translates Jaeger spans to OTLP and forwards them to Tempo.
  jaeger:
    protocols:
      thrift_compact:
        endpoint: 0.0.0.0:6831
  hostmetrics:
    collection_interval: 10s
    scrapers:
      cpu:
      disk:
      load:
      filesystem:
      memory:
      network:
      processes:
  prometheus:
    config:
      scrape_configs:
        - job_name: 'beyla'
          scrape_interval: 15s
          static_configs:
            - targets: ['localhost:9400']
          relabel_configs:
            - target_label: instance
              replacement: '${env:HOSTNAME}:9400'
            - target_label: cluster
              replacement: '${env:CLUSTER_NAME}'
        - job_name: 'ebpf-exporter'
          scrape_interval: 15s
          static_configs:
            - targets: ['localhost:9435']
          relabel_configs:
            - target_label: instance
              replacement: '${env:HOSTNAME}:9435'
            - target_label: cluster
              replacement: '${env:CLUSTER_NAME}'
        - job_name: 'cassandra-maac'
          scrape_interval: 15s
          static_configs:
            - targets: ['localhost:9000']
          relabel_configs:
            - target_label: instance
              replacement: '${env:HOSTNAME}:9000'
            - target_label: cluster
              replacement: '${env:CLUSTER_NAME}'
        - job_name: 'yace'
          scrape_interval: 5s
          scrape_timeout: 5s
          static_configs:
            - targets: ['localhost:5001']
          relabel_configs:
            - target_label: instance
              replacement: '${env:HOSTNAME}:5001'
            - target_label: cluster
              replacement: '${env:CLUSTER_NAME}'
        - job_name: 'hubble'
          scrape_interval: 15s
          static_configs:
            - targets: ['localhost:9965']
          relabel_configs:
            - target_label: instance
              replacement: '${env:HOSTNAME}:9965'
            - target_label: cluster
              replacement: '${env:CLUSTER_NAME}'
        - job_name: 'tempo'
          scrape_interval: 15s
          static_configs:
            - targets: ['localhost:3200']
          relabel_configs:
            - target_label: instance
              replacement: '${env:HOSTNAME}:3200'
            - target_label: cluster
              replacement: '${env:CLUSTER_NAME}'
__KIT_SCRAPE_JOBS__
  filelog/system:
    include:
      - /var/log/**/*.log
      - /var/log/messages
      - /var/log/syslog
    exclude:
      - /var/log/**/*.gz
      - /var/log/**/*.old
      - /var/log/easydblab/tools/*.log
      - /var/log/containers/**
      - /var/log/pods/**
    start_at: end
    include_file_path: true
    include_file_name: true
    attributes:
      source: system
  filelog/containers:
    include:
      - /var/log/pods/**/*.log
    exclude:
      - /var/log/pods/default_otel-collector-*/**
      - /var/log/pods/default_fluent-bit-journald-*/**
      - /var/log/pods/default_chi-clickhouse-*/**
      - /var/log/pods/default_chk-clickhouse-keeper-*/**
    start_at: end
    include_file_path: true
    include_file_name: false
    operators:
      - type: container
        id: container_parser
        on_error: send
  filelog/clickhouse-containers:
    include:
      - /var/log/pods/default_chi-clickhouse-*/**/*.log
      - /var/log/pods/default_chk-clickhouse-keeper-*/**/*.log
    start_at: end
    include_file_path: true
    include_file_name: false
    operators:
      - type: container
        id: container_parser
        on_error: send
      - type: regex_parser
        id: extract_ch_parts
        regex: '^.*?<(?P<ch_level>Debug|Information|Warning|Error|Fatal|Trace)>\s+(?P<ch_message>.+)$'
        parse_from: body
        parse_to: attributes
        on_error: send
      - type: severity_parser
        id: parse_ch_severity
        parse_from: attributes.ch_level
        on_error: send
        mapping:
          debug: Debug
          info: Information
          warn: Warning
          error: Error
          fatal: Fatal
          trace: Trace
      - type: move
        id: set_ch_body
        from: attributes.ch_message
        to: body
        on_error: send
  filelog/tools:
    include:
      - /var/log/easydblab/tools/*.log
    start_at: beginning
    include_file_path: true
    include_file_name: true
    attributes:
      source: tool-runner
  filelog/cassandra:
    include:
      - /mnt/db1/cassandra/logs/*.log
    exclude:
      - /mnt/db1/cassandra/logs/*.gz
    start_at: end
    include_file_path: true
    include_file_name: true
    attributes:
      source: cassandra
  # NOTE: ClickHouse logs via container stdout/stderr (K8s pod),
  # collected by filelog/containers. File-based receivers are not used.

processors:
  batch:
    timeout: 10s
    send_batch_size: 1024
  resource/cluster:
    attributes:
      - action: upsert
        key: cluster
        value: '${env:CLUSTER_NAME}'
  resourcedetection:
    detectors: [system]
    system:
      hostname_sources: ["os"]
      resource_attributes:
        host.name:
          enabled: true
  # Copy k8s.app.instance resource attribute to a log-level service attribute so
  # container logs share the same service field as journald logs.
  transform/add_service:
    log_statements:
      - context: log
        statements:
          - set(attributes["service"], resource.attributes["k8s.app.instance"]) where resource.attributes["k8s.app.instance"] != ""

  # Copy service.name → service_name on the resource so Grafana's auto-generated log queries
  # (which use underscore-style label names) match VictoriaLogs fields.
  transform/add_service_name:
    log_statements:
      - context: resource
        statements:
          - set(attributes["service_name"], attributes["service.name"]) where attributes["service.name"] != ""

  # Extract node_role from K8s node label "type" (db, app) set during K3s agent join.
  # pod_association enables enrichment of filelog/containers records with pod labels
  # by matching k8s.pod.name + k8s.namespace.name resource attributes extracted from the log file path.
  k8sattributes:
    passthrough: false
    pod_association:
      - sources:
          - from: resource_attribute
            name: k8s.pod.name
          - from: resource_attribute
            name: k8s.namespace.name
    extract:
      metadata:
        - k8s.node.name
      labels:
        - tag_name: node_role
          key: type
          from: node
        - tag_name: k8s.app.instance
          key: app.kubernetes.io/instance
          from: pod

exporters:
  prometheusremotewrite:
    endpoint: http://victoriametrics.default.svc.cluster.local:8428/api/v1/write
    tls:
      insecure: true
    resource_to_telemetry_conversion:
      enabled: true
  otlphttp/victorialogs:
    endpoint: http://victorialogs.default.svc.cluster.local:9428/insert/opentelemetry
    tls:
      insecure: true
  otlp/tempo:
    endpoint: tempo.default.svc.cluster.local:4320
    tls:
      insecure: true

connectors:
  # Converts spans to Prometheus metrics (calls_total, latency histograms).
  # Exemplars link metric data points back to individual traces in Tempo.
  spanmetrics:
    namespace: traces.spanmetrics
    histogram:
      explicit:
        buckets: [2ms, 4ms, 6ms, 8ms, 10ms, 50ms, 100ms, 200ms, 400ms, 800ms, 1s, 1400ms, 2s, 5s, 10s]
    dimensions:
      - name: http.method
      - name: http.route
      - name: http.status_code
      - name: db.system
    exemplars:
      enabled: true
    metrics_flush_interval: 15s
    resource_metrics_key_attributes:
      - service.name
  # Derives service-to-service call rate and latency metrics from trace parent/child relationships.
  servicegraph:
    latency_histogram_buckets: [2ms, 4ms, 6ms, 8ms, 10ms, 50ms, 100ms, 200ms, 400ms, 800ms, 1s, 1400ms, 2s, 5s, 10s]
    dimensions:
      - http.method
      - http.status_code
    store:
      ttl: 2s
      max_items: 1000

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    # Local metrics — resourcedetection stamps host.name, k8sattributes adds node_role from node label
    metrics/local:
      receivers: [hostmetrics, prometheus]
      processors: [resource/cluster, resourcedetection, k8sattributes, batch]
      exporters: [prometheusremotewrite]
    # Remote metrics via OTLP (e.g., Spark nodes) — stamp cluster label to match local metrics
    metrics/otlp:
      receivers: [otlp]
      processors: [resource/cluster, batch]
      exporters: [prometheusremotewrite]
    logs/local:
      receivers: [filelog/system, filelog/tools, filelog/cassandra]
      processors: [resourcedetection, k8sattributes, transform/add_service_name, batch]
      exporters: [otlphttp/victorialogs]
    logs/containers:
      receivers: [filelog/containers, filelog/clickhouse-containers]
      processors: [k8sattributes, transform/add_service, transform/add_service_name, resource/cluster, batch]
      exporters: [otlphttp/victorialogs]
    logs/otlp:
      receivers: [otlp]
      processors: [transform/add_service_name, batch]
      exporters: [otlphttp/victorialogs]
    traces:
      receivers: [otlp, jaeger]
      processors: [batch]
      exporters: [otlp/tempo, spanmetrics, servicegraph]
    metrics/spanmetrics:
      receivers: [spanmetrics]
      processors: [batch]
      exporters: [prometheusremotewrite]
    metrics/servicegraph:
      receivers: [servicegraph]
      processors: [batch]
      exporters: [prometheusremotewrite]
