#
# Cassandra SideCar configuration template for K3s DaemonSet deployment.
# __HOST_IP__ is substituted by the init container at pod startup using status.hostIP.
#
cassandra_instances:
  - id: 1
    host: __HOST_IP__
    port: 9042
    username: cassandra
    password: cassandra
    data_dirs:
      - /mnt/db1/cassandra/data/
    commitlog_dir: /mnt/db1/cassandra/commitlog
    hints_dir: /mnt/db1/cassandra/hints
    saved_caches_dir: /mnt/db1/cassandra/saved_caches
    staging_dir: /mnt/db1/cassandra/import
    jmx_host: 127.0.0.1
    jmx_port: 7199
    jmx_ssl_enabled: false

sidecar:
  host: 0.0.0.0
  port: 9043
  dns_resolver: resolve_to_ip
  request_idle_timeout_millis: 300000
  request_timeout_millis: 300000
  tcp_keep_alive: false
  accept_backlog: 1024
  server_verticle_instances: 1
  throttle:
    stream_requests_per_sec: 5000
    delay_sec: 5
    timeout_sec: 10
  traffic_shaping:
    inbound_global_bandwidth_bps: 0
    outbound_global_bandwidth_bps: 0
    peak_outbound_global_bandwidth_bps: 419430400
    max_delay_to_wait_millis: 15000
    check_interval_for_stats_millis: 1000
    inbound_global_file_bandwidth_bps: 0
  sstable_upload:
    concurrent_upload_limit: 80
    min_free_space_percent: 10
  allowable_time_skew_in_minutes: 60
  sstable_import:
    poll_interval_millis: 5000
    cache:
      expire_after_access_millis: 7200000
      maximum_size: 10000
  worker_pools:
    service:
      name: "sidecar-worker-pool"
      size: 20
      max_execution_time_millis: 60000
    internal:
      name: "sidecar-internal-worker-pool"
      size: 20
      max_execution_time_millis: 900000
  jmx:
    max_retries: 3
    retry_delay_millis: 200
  schema:
    is_enabled: true
    keyspace: sidecar_internal
    replication_strategy: NetworkTopologyStrategy
    replication_factor: 3

driver_parameters:
  contact_points:
    - "__HOST_IP__:9042"
  num_connections: 6

healthcheck:
  initial_delay_millis: 0
  poll_freq_millis: 30000

metrics:
  registry_name: cassandra_sidecar
  vertx:
    enabled: true
    expose_via_jmx: false
    jmx_domain_name: sidecar.vertx.jmx_domain
  include:
    - type: "regex"
      value: "sidecar.*"
    - type: "regex"
      value: "vertx.*"

cassandra_input_validation:
  forbidden_keyspaces:
    - system_schema
    - system_traces
    - system_distributed
    - system
    - system_auth
    - system_views
    - system_virtual_schema
  allowed_chars_for_directory: "[a-zA-Z][a-zA-Z0-9_]{0,47}"
  allowed_chars_for_quoted_name: "[a-zA-Z_0-9]{1,48}"
  allowed_chars_for_component_name: "[a-zA-Z0-9_-]+(.db|.cql|.json|.crc32|TOC.txt)"
  allowed_chars_for_restricted_component_name: "[a-zA-Z0-9_-]+(.db|TOC.txt)"

blob_restore:
  job_discovery_active_loop_delay_millis: 10000
  job_discovery_idle_loop_delay_millis: 10000
  job_discovery_recency_days: 5
  slice_process_max_concurrency: 20
  restore_job_tables_ttl_seconds: 7776000

s3_client:
  concurrency: 4
  thread_name_prefix: s3-client
  thread_keep_alive_seconds: 60
